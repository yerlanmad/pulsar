; ===========================================
; Pulsar Dialplan
; ===========================================

[general]
static=yes
writeprotect=no

; --- Internal calls between agents ---
[from-internal]
; Agent-to-agent calls (10xx)
exten => _10XX,1,NoOp(Internal call to ${EXTEN})
 same => n,Dial(PJSIP/${EXTEN},30)
 same => n,Hangup()

; Outbound calls via Beeline trunk — dial 9 + number (e.g. 977071234567)
exten => _9.,1,NoOp(Outbound call to ${EXTEN:1} via Beeline)
 same => n,Dial(PJSIP/${EXTEN:1}@beeline-trunk,60)
 same => n,Hangup()

; Outbound calls via Twilio trunk — dial 8 + number (e.g. 8+12125551234)
exten => _8.,1,NoOp(Outbound call to ${EXTEN:1} via Twilio)
 same => n,Dial(PJSIP/${EXTEN:1}@twilio-trunk,60)
 same => n,Hangup()

; --- Incoming calls from trunk ---
[from-trunk]
; Route +1800* to Support queue
exten => _+1800.,1,NoOp(Incoming call to Support: ${EXTEN})
 same => n,Answer()
 same => n,Queue(support,t,,,300)
 same => n,Hangup()

; Route +1900* to Sales queue
exten => _+1900.,1,NoOp(Incoming call to Sales: ${EXTEN})
 same => n,Answer()
 same => n,Queue(sales,t,,,180)
 same => n,Hangup()

; Default — catch-all
exten => _X.,1,NoOp(Incoming call: ${EXTEN})
 same => n,Answer()
 same => n,Queue(support,t,,,300)
 same => n,Hangup()
