; ===========================================
; Pulsar PJSIP Configuration
; ===========================================

; --- Transport ---
[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060
external_media_address=89.167.93.11
external_signaling_address=89.167.93.11
local_net=172.18.0.0/16

; --- Default Agent Template ---
[agent-template](!)
type=endpoint
context=from-internal
disallow=all
allow=ulaw
allow=alaw
direct_media=no
rtp_symmetric=yes
force_rport=yes
rewrite_contact=yes

[agent-template-auth](!)
type=auth
auth_type=userpass

[agent-template-aor](!)
type=aor
max_contacts=1
remove_existing=yes

; --- Agent 1001 ---
[1001](agent-template)
auth=1001-auth
aors=1001

[1001-auth](agent-template-auth)
username=1001
password=changeme1001

[1001](agent-template-aor)

; --- Agent 1002 ---
[1002](agent-template)
auth=1002-auth
aors=1002

[1002-auth](agent-template-auth)
username=1002
password=changeme1002

[1002](agent-template-aor)

; --- Agent 1003 ---
[1003](agent-template)
auth=1003-auth
aors=1003

[1003-auth](agent-template-auth)
username=1003
password=changeme1003

[1003](agent-template-aor)

; --- SIP Trunk: Beeline CloudPBX ---
[beeline-trunk]
type=endpoint
context=from-trunk
disallow=all
allow=alaw
outbound_auth=beeline-auth
aors=beeline-aor
from_domain=vpbx-company-1708.CLOUDPBX.BEELINE.KZ
from_user=5858

[beeline-auth]
type=auth
auth_type=userpass
username=5858
password=BEELINE_PASSWORD_PLACEHOLDER

[beeline-aor]
type=aor
contact=sip:46.227.186.231:6050
qualify_frequency=60

[beeline-identify]
type=identify
endpoint=beeline-trunk
match=46.227.186.231

[beeline-registration]
type=registration
transport=transport-udp
outbound_auth=beeline-auth
server_uri=sip:vpbx-company-1708.CLOUDPBX.BEELINE.KZ
client_uri=sip:5858@vpbx-company-1708.CLOUDPBX.BEELINE.KZ
outbound_proxy=sip:46.227.186.231:6050\;lr
contact_user=5858
retry_interval=60
expiration=3600

