; ===========================================
; Pulsar PJSIP Configuration
; ===========================================

; --- Transport ---
[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060
external_media_address=89.167.93.11
external_signaling_address=89.167.93.11
local_net=172.18.0.0/16

; --- WebSocket Transport (for WebRTC) ---
[transport-ws]
type=transport
protocol=ws
bind=0.0.0.0:8088

; --- Default Agent Template ---
[agent-template](!)
type=endpoint
context=from-internal
disallow=all
allow=ulaw
allow=alaw
direct_media=no
rtp_symmetric=yes
force_rport=yes
rewrite_contact=yes

; --- WebRTC Agent Template ---
[agent-webrtc-template](!)
type=endpoint
context=from-internal
disallow=all
allow=opus
allow=ulaw
allow=alaw
webrtc=yes
direct_media=no
rtp_symmetric=yes
force_rport=yes
rewrite_contact=yes
rtcp_mux=yes
ice_support=yes
use_avpf=yes
media_encryption=dtls
dtls_auto_generate_cert=yes

[agent-template-auth](!)
type=auth
auth_type=userpass

[agent-template-aor](!)
type=aor
max_contacts=2
remove_existing=yes

; --- Agent 1001 ---
[1001](agent-template)
auth=1001-auth
aors=1001

[1001-auth](agent-template-auth)
username=1001
password=changeme1001

[1001](agent-template-aor)

; --- Agent 1002 ---
[1002](agent-template)
auth=1002-auth
aors=1002

[1002-auth](agent-template-auth)
username=1002
password=changeme1002

[1002](agent-template-aor)

; --- Agent 1003 ---
[1003](agent-template)
auth=1003-auth
aors=1003

[1003-auth](agent-template-auth)
username=1003
password=changeme1003

[1003](agent-template-aor)

; --- SIP Trunk: Twilio ---
[twilio-trunk]
type=endpoint
context=from-trunk
disallow=all
allow=ulaw
allow=alaw
outbound_auth=twilio-auth
aors=twilio-aor
