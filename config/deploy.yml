# Name of your application. Used to uniquely configure containers.
service: pulsar

# Name of the container image.
image: erlanmad/pulsar

# Deploy to these servers (replace with your VPS IP).
servers:
  web:
    - 89.167.93.11

# SSL via Let's Encrypt.
proxy:
  ssl: true
  host: pulsar.madgroup.kz

# Container registry (use Docker Hub, GHCR, or private registry).
registry:
  # server: ghcr.io
  # username:
  #   - KAMAL_REGISTRY_USERNAME
  # password:
  #   - KAMAL_REGISTRY_PASSWORD
  username: erlanmad
  password:
  - KAMAL_REGISTRY_PASSWORD

# Environment variables.
env:
  secret:
    - RAILS_MASTER_KEY
  clear:
    SOLID_QUEUE_IN_PUMA: true
    WEB_CONCURRENCY: 2
    ASTERISK_ARI_URL: http://pulsar-asterisk:8088/ari
    ASTERISK_ARI_USER: asterisk
    ASTERISK_AMI_HOST: pulsar-asterisk
    ASTERISK_AMI_PORT: 5038
    ASTERISK_AMI_USER: admin
    ASTERISK_RECORDINGS_PATH: /rails/recordings
    ASTERISK_CONFIG_PATH: /rails/asterisk_conf

# Aliases for common operations.
aliases:
  console: app exec --interactive --reuse "bin/rails console"
  shell: app exec --interactive --reuse "bash"
  logs: app logs -f
  dbc: app exec --interactive --reuse "bin/rails dbconsole --include-password"

# Persistent storage for SQLite databases and recordings.
volumes:
  - "pulsar_storage:/rails/storage"
  - "asterisk_recordings:/rails/recordings"
  - "asterisk_conf:/rails/asterisk_conf"

# Bridge assets between versions.
asset_path: /rails/public/assets

# Build for amd64 (VPS architecture).
builder:
  arch: amd64

# Asterisk as an accessory service.
accessories:
  asterisk:
    image: andrius/asterisk:20
    host: 89.167.93.11
    port: "5060:5060"
    options:
      publish:
        - "5060:5060/udp"
        - "8088:8088"
        - "8089:8089"
        - "10000-10100:10000-10100/udp"
    volumes:
      - "asterisk_recordings:/var/spool/asterisk/recording"
      - "asterisk_conf:/etc/asterisk/custom"
      - "asterisk_tls:/etc/asterisk/tls"
    env:
      clear:
        ASTERISK_UID: 1000
        ASTERISK_GID: 1000
